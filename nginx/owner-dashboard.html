<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sender Safety — Owner Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3248;
    --text: #e2e4f0;
    --text2: #8b90a8;
    --accent: #6c8bef;
    --green: #4ade80;
    --red: #f87171;
    --yellow: #fbbf24;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }

  /* -- Login overlay -- */
  #login-overlay {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; align-items: center; justify-content: center; z-index: 100;
  }
  #login-overlay.hidden { display: none; }
  .login-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 40px; width: 360px; text-align: center;
  }
  .login-box h1 { font-size: 20px; margin-bottom: 6px; }
  .login-box p { color: var(--text2); font-size: 13px; margin-bottom: 24px; }
  .login-box input {
    width: 100%; padding: 10px 14px; background: var(--bg);
    border: 1px solid var(--border); border-radius: 8px; color: var(--text);
    font-size: 14px; margin-bottom: 12px; outline: none;
  }
  .login-box input:focus { border-color: var(--accent); }
  .login-box button {
    width: 100%; padding: 10px; background: var(--accent); border: none;
    border-radius: 8px; color: #fff; font-size: 14px; font-weight: 600;
    cursor: pointer;
  }
  .login-box button:hover { opacity: 0.9; }
  #login-error { color: var(--red); font-size: 13px; margin-top: 10px; min-height: 18px; }

  /* -- Main layout -- */
  #app { display: none; max-width: 1100px; margin: 0 auto; padding: 32px 24px; }
  #app.visible { display: block; }

  header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; }
  header h1 { font-size: 22px; font-weight: 700; }
  header h1 span { color: var(--accent); }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .period-select {
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    padding: 6px 12px; border-radius: 8px; font-size: 13px; cursor: pointer;
  }
  .refresh-btn {
    background: var(--surface); border: 1px solid var(--border); color: var(--text2);
    padding: 6px 14px; border-radius: 8px; font-size: 13px; cursor: pointer;
  }
  .refresh-btn:hover { border-color: var(--accent); color: var(--text); }
  #last-updated { font-size: 12px; color: var(--text2); }

  /* -- Summary cards -- */
  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; margin-bottom: 32px; }
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 20px 18px;
  }
  .card-label { font-size: 12px; color: var(--text2); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 8px; }
  .card-value { font-size: 28px; font-weight: 700; }
  .card-value.green { color: var(--green); }
  .card-value.red { color: var(--red); }
  .card-value.accent { color: var(--accent); }
  .card-value.yellow { color: var(--yellow); }
  .card-sub { font-size: 12px; color: var(--text2); margin-top: 4px; }

  /* -- Charts -- */
  .charts { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 32px; }
  @media (max-width: 700px) { .charts { grid-template-columns: 1fr; } }
  .chart-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 20px;
  }
  .chart-box h2 { font-size: 14px; font-weight: 600; margin-bottom: 16px; color: var(--text2); text-transform: uppercase; letter-spacing: .05em; }
  .chart-wrap { position: relative; height: 200px; }

  /* -- Tables -- */
  .section-title { font-size: 14px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 14px; }
  .section-wrap { margin-bottom: 32px; }
  table { width: 100%; border-collapse: collapse; background: var(--surface); border-radius: 10px; overflow: hidden; border: 1px solid var(--border); }
  th { text-align: left; padding: 12px 16px; font-size: 12px; color: var(--text2); text-transform: uppercase; letter-spacing: .05em; border-bottom: 1px solid var(--border); }
  td { padding: 12px 16px; font-size: 14px; border-bottom: 1px solid var(--border); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--surface2); }
  .pill {
    display: inline-block; padding: 2px 8px; border-radius: 20px;
    font-size: 12px; font-weight: 600;
  }
  .pill-red { background: rgba(248,113,113,.15); color: var(--red); }
  .pill-green { background: rgba(74,222,128,.15); color: var(--green); }
  .pill-gray { background: rgba(139,144,168,.15); color: var(--text2); }
  .pill-yellow { background: rgba(251,191,36,.15); color: var(--yellow); }

  /* -- Recent emails table specifics -- */
  .recent-email-addr { font-size: 12px; color: var(--text2); max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .scan-time { font-size: 13px; font-variant-numeric: tabular-nums; }
  .rule-text { font-size: 12px; color: var(--text2); max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .ai-badge { font-size: 11px; font-weight: 600; padding: 1px 6px; border-radius: 4px; margin-left: 4px; vertical-align: middle; }
  .ai-badge-flag { background: rgba(248,113,113,.2); color: var(--red); }
  .ai-badge-pass { background: rgba(74,222,128,.2); color: var(--green); }

  .no-data { text-align: center; padding: 48px; color: var(--text2); font-size: 14px; }
  .error-banner { background: rgba(248,113,113,.1); border: 1px solid rgba(248,113,113,.3); color: var(--red); border-radius: 8px; padding: 12px 16px; margin-bottom: 20px; font-size: 13px; display: none; }
  .loading { text-align: center; padding: 80px; color: var(--text2); font-size: 14px; }
</style>
</head>
<body>

<!-- Login -->
<div id="login-overlay">
  <div class="login-box">
    <h1>Sender Safety</h1>
    <p>Owner dashboard — enter your admin secret to continue</p>
    <input type="password" id="secret-input" placeholder="Admin secret" autocomplete="current-password">
    <button onclick="login()">Sign in</button>
    <div id="login-error"></div>
  </div>
</div>

<!-- App -->
<div id="app">
  <header>
    <h1>Sender Safety <span>Performance</span></h1>
    <div class="header-right">
      <select class="period-select" id="period-select" onchange="reload()">
        <option value="7">Last 7 days</option>
        <option value="30" selected>Last 30 days</option>
        <option value="90">Last 90 days</option>
      </select>
      <button class="refresh-btn" onclick="reload()">&#8635; Refresh</button>
      <span id="last-updated"></span>
    </div>
  </header>

  <div id="error-banner" class="error-banner"></div>
  <div id="loading" class="loading">Loading&#8230;</div>

  <div id="content" style="display:none">
    <!-- Summary cards -->
    <div class="cards" id="cards"></div>

    <!-- Charts -->
    <div class="charts">
      <div class="chart-box">
        <h2>Emails per day</h2>
        <div class="chart-wrap"><canvas id="chart-volume"></canvas></div>
      </div>
      <div class="chart-box">
        <h2>Avg scan time (ms)</h2>
        <div class="chart-wrap"><canvas id="chart-timing"></canvas></div>
      </div>
    </div>

    <!-- Recent emails -->
    <div class="section-wrap">
      <div class="section-title">Recent emails (last 10)</div>
      <div id="recent-table"></div>
    </div>

    <!-- Customer breakdown -->
    <div class="section-wrap">
      <div class="section-title">Customer breakdown</div>
      <div id="customer-table"></div>
    </div>
  </div>
</div>

<script>
const API_BASE = '/api';
let _secret = sessionStorage.getItem('admin_secret') || '';
let _charts = {};

// -- Auth --
async function login() {
  const val = document.getElementById('secret-input').value.trim();
  if (!val) return;
  const btn = document.querySelector('.login-box button');
  btn.textContent = 'Signing in\u2026';
  btn.disabled = true;
  document.getElementById('login-error').textContent = '';
  _secret = val;
  sessionStorage.setItem('admin_secret', val);
  try {
    await loadData();
  } catch(e) {
    document.getElementById('login-error').textContent = 'Error: ' + e.message;
  } finally {
    btn.textContent = 'Sign in';
    btn.disabled = false;
  }
}

document.getElementById('secret-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') login();
});

// -- Data loading --
function reload() { loadData(); }

async function loadData() {
  const days = document.getElementById('period-select')?.value || 30;
  document.getElementById('loading').style.display = 'block';
  document.getElementById('content').style.display = 'none';
  document.getElementById('error-banner').style.display = 'none';

  const resp = await fetch(`${API_BASE}/admin/performance?days=${days}`, {
    headers: { Authorization: `Bearer ${_secret}` }
  });

  if (resp.status === 401) {
    sessionStorage.removeItem('admin_secret');
    _secret = '';
    document.getElementById('login-error').textContent = 'Incorrect secret \u2014 please try again.';
    document.getElementById('login-overlay').classList.remove('hidden');
    document.getElementById('app').classList.remove('visible');
    document.getElementById('loading').style.display = 'none';
    return;
  }
  if (!resp.ok) throw new Error(`Server returned ${resp.status}`);

  const data = await resp.json();

  // Auth passed -- show app
  document.getElementById('login-overlay').classList.add('hidden');
  document.getElementById('app').classList.add('visible');

  try {
    render(data);
  } catch(renderErr) {
    const banner = document.getElementById('error-banner');
    banner.textContent = 'Render error: ' + renderErr.message;
    banner.style.display = 'block';
    console.error(renderErr);
  }

  document.getElementById('loading').style.display = 'none';
  document.getElementById('content').style.display = 'block';
  document.getElementById('last-updated').textContent =
    'Updated ' + new Date().toLocaleTimeString();
}

// -- Render --
function render(data) {
  renderCards(data.summary);
  renderVolumeChart(data.daily_volume);
  renderTimingChart(data.daily_timing);
  renderRecentTable(data.recent_emails || []);
  renderCustomerTable(data.customer_breakdown);
}

function renderCards(s) {
  const blockRate = s.block_rate_pct || 0;
  const avgMs = s.avg_ms != null ? s.avg_ms + 'ms' : '\u2014';
  const p95Ms = s.p95_ms != null ? s.p95_ms + 'ms' : '\u2014';

  document.getElementById('cards').innerHTML = `
    <div class="card">
      <div class="card-label">Total emails</div>
      <div class="card-value accent">${s.total.toLocaleString()}</div>
      <div class="card-sub">in selected period</div>
    </div>
    <div class="card">
      <div class="card-label">Blocked</div>
      <div class="card-value red">${s.blocked.toLocaleString()}</div>
      <div class="card-sub">${blockRate}% block rate</div>
    </div>
    <div class="card">
      <div class="card-label">Allowed</div>
      <div class="card-value green">${s.allowed.toLocaleString()}</div>
    </div>
    <div class="card">
      <div class="card-label">Avg scan time</div>
      <div class="card-value yellow">${avgMs}</div>
      <div class="card-sub">p95: ${p95Ms}</div>
    </div>
    <div class="card">
      <div class="card-label">Active customers</div>
      <div class="card-value accent">${s.active_customers}</div>
    </div>
  `;
}

function renderVolumeChart(rows) {
  const labels = rows.map(r => r.day.slice(5)); // MM-DD
  const allowed = rows.map(r => r.allowed);
  const blocked = rows.map(r => r.blocked);

  destroyChart('chart-volume');
  _charts['chart-volume'] = new Chart(document.getElementById('chart-volume'), {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: 'Allowed', data: allowed, backgroundColor: 'rgba(74,222,128,0.6)', stack: 'a' },
        { label: 'Blocked', data: blocked, backgroundColor: 'rgba(248,113,113,0.6)', stack: 'a' },
      ]
    },
    options: chartOpts({ stacked: true, yLabel: 'emails' })
  });
}

function renderTimingChart(rows) {
  const labels = rows.map(r => r.day.slice(5));
  const avg = rows.map(r => r.avg_ms);
  const p95 = rows.map(r => r.p95_ms);

  destroyChart('chart-timing');

  if (!rows.length) {
    const ctx = document.getElementById('chart-timing');
    ctx.style.display = 'none';
    ctx.parentNode.insertAdjacentHTML('beforeend',
      '<p style="color:var(--text2);font-size:13px;text-align:center;padding:60px 0">No timing data yet \u2014 will appear after next emails are scanned</p>');
    return;
  }

  _charts['chart-timing'] = new Chart(document.getElementById('chart-timing'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'Avg ms', data: avg, borderColor: '#6c8bef', backgroundColor: 'rgba(108,139,239,0.1)', tension: 0.3, fill: true },
        { label: 'p95 ms', data: p95, borderColor: '#fbbf24', backgroundColor: 'transparent', tension: 0.3, borderDash: [4,3] },
      ]
    },
    options: chartOpts({ yLabel: 'ms' })
  });
}

function renderRecentTable(rows) {
  if (!rows.length) {
    document.getElementById('recent-table').innerHTML =
      '<div class="no-data">No emails scanned yet</div>';
    return;
  }

  const trs = rows.map(r => {
    const outcomePill = r.outcome === 'blocked'
      ? '<span class="pill pill-red">Blocked</span>'
      : '<span class="pill pill-green">Allowed</span>';

    const scanTime = r.processing_ms != null
      ? `<span class="scan-time">${r.processing_ms.toLocaleString()}ms</span>`
      : '<span style="color:var(--text2)">\u2014</span>';

    const rule = r.rule_triggered
      ? `<span class="rule-text" title="${escHtml(r.rule_triggered)}">${escHtml(r.rule_triggered)}</span>`
      : '<span style="color:var(--text2)">\u2014</span>';

    let aiCol = '<span style="color:var(--text2)">\u2014</span>';
    if (r.ai_decision) {
      const cls = r.ai_decision === 'flag' ? 'ai-badge-flag' : 'ai-badge-pass';
      const label = r.ai_decision === 'flag' ? 'AI: flag' : 'AI: pass';
      const conf = r.ai_confidence != null ? ` ${r.ai_confidence}%` : '';
      aiCol = `<span class="ai-badge ${cls}">${label}${conf}</span>`;
    }

    const ts = r.created_at ? formatTime(r.created_at) : '\u2014';

    return `<tr>
      <td style="color:var(--text2);font-size:12px">${ts}</td>
      <td><div class="recent-email-addr" title="${escHtml(r.sender)}">${escHtml(r.sender)}</div></td>
      <td><div class="recent-email-addr" title="${escHtml(r.recipient)}">${escHtml(r.recipient)}</div></td>
      <td style="font-size:12px;color:var(--text2)">${escHtml(r.domain)}</td>
      <td>${outcomePill}</td>
      <td>${rule}</td>
      <td>${aiCol}</td>
      <td>${scanTime}</td>
    </tr>`;
  }).join('');

  document.getElementById('recent-table').innerHTML = `
    <table>
      <thead><tr>
        <th>Time</th>
        <th>From</th>
        <th>To</th>
        <th>Domain</th>
        <th>Result</th>
        <th>Rule triggered</th>
        <th>AI</th>
        <th>Scan time</th>
      </tr></thead>
      <tbody>${trs}</tbody>
    </table>`;
}

function renderCustomerTable(rows) {
  if (!rows.length) {
    document.getElementById('customer-table').innerHTML =
      '<div class="no-data">No customer activity in this period</div>';
    return;
  }

  const trs = rows.map(r => {
    const rate = r.block_rate_pct;
    const ratePill = rate > 20
      ? `<span class="pill pill-red">${rate}%</span>`
      : rate > 0
        ? `<span class="pill pill-green">${rate}%</span>`
        : `<span class="pill pill-gray">0%</span>`;
    const avgMs = r.avg_ms != null ? r.avg_ms + 'ms' : '\u2014';
    const lastSeen = r.last_seen ? new Date(r.last_seen).toLocaleDateString() : '\u2014';
    return `<tr>
      <td>${escHtml(r.domain)}</td>
      <td style="color:var(--text2);font-size:12px">${escHtml(r.email)}</td>
      <td>${r.total.toLocaleString()}</td>
      <td>${r.blocked.toLocaleString()}</td>
      <td>${ratePill}</td>
      <td>${avgMs}</td>
      <td style="color:var(--text2);font-size:12px">${lastSeen}</td>
    </tr>`;
  }).join('');

  document.getElementById('customer-table').innerHTML = `
    <table>
      <thead><tr>
        <th>Domain</th><th>Account</th><th>Total</th><th>Blocked</th>
        <th>Block rate</th><th>Avg time</th><th>Last active</th>
      </tr></thead>
      <tbody>${trs}</tbody>
    </table>`;
}

// -- Helpers --
function destroyChart(id) {
  if (_charts[id]) { _charts[id].destroy(); delete _charts[id]; }
}

function escHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function formatTime(iso) {
  try {
    const d = new Date(iso);
    const now = new Date();
    const diff = (now - d) / 1000;
    if (diff < 60) return Math.round(diff) + 's ago';
    if (diff < 3600) return Math.round(diff / 60) + 'm ago';
    if (diff < 86400) return Math.round(diff / 3600) + 'h ago';
    return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
  } catch(e) { return iso; }
}

function chartOpts({ stacked = false, yLabel = '' } = {}) {
  return {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { labels: { color: '#8b90a8', font: { size: 11 } } } },
    scales: {
      x: {
        stacked,
        ticks: { color: '#8b90a8', font: { size: 10 }, maxTicksLimit: 10 },
        grid: { color: 'rgba(46,50,72,0.6)' }
      },
      y: {
        stacked,
        ticks: { color: '#8b90a8', font: { size: 10 } },
        grid: { color: 'rgba(46,50,72,0.6)' },
        title: { display: !!yLabel, text: yLabel, color: '#8b90a8', font: { size: 11 } }
      }
    }
  };
}

// -- Boot --
if (_secret) {
  loadData();
} else {
  document.getElementById('login-overlay').classList.remove('hidden');
}
</script>
</body>
</html>

server {
    listen 80;
    server_name app.sendersafety.com;
    # nosemgrep: nginx.host-header
    return 301 https://app.sendersafety.com$request_uri;
}

server {
    listen 443 ssl;
    server_name app.sendersafety.com;

    ssl_certificate /etc/letsencrypt/live/app.sendersafety.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.sendersafety.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Sprint B C14 + F-57 — security response headers.
    # CSP locks the SPA down to its own origin. OAuth is now server-side redirect
    # flow (no GIS popup), so accounts.google.com / apis.google.com are no longer
    # needed in script/style/connect/frame-src. 'unsafe-inline' kept on style-src
    # because Vite injects a small runtime style block for code-split CSS.
    # frame-ancestors 'none' = clickjacking protection (replaces X-Frame-Options).
    # form-action allows POST to /api/* on same origin; OAuth redirect lands here
    # via 302 from Google (browser navigation, not form submit — no CSP impact).
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; frame-src 'none'; frame-ancestors 'none'; form-action 'self'; base-uri 'self'; object-src 'none'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location /webhooks/ {
        # SNS payloads can be ~25KB; allow 10MB cap for headroom.
        client_max_body_size 10m;
        proxy_pass http://backend:8000/webhooks/;
        proxy_set_header Host app.sendersafety.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # /internal/* endpoints are for the SMTP service only. Block any external
    # access — even though backend now enforces a shared-secret header, defense
    # in depth: never let these reach the backend from the public internet.
    location ~ ^/api/internal/ {
        return 404;
    }

    location /api/ {
        # JSON-only API. 64KB is enough for our biggest POST body
        # (rule create) and small enough to limit memory exhaustion (H14).
        client_max_body_size 64k;
        proxy_pass http://backend:8000/;
        proxy_set_header Host app.sendersafety.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Owner-only performance dashboard — single HTML file, no index listing.
    # URL is intentionally obscure; auth is enforced via ADMIN_SECRET Bearer check.
    # CSP is relaxed vs the customer SPA: unsafe-inline needed for the inline
    # <script> block, and jsdelivr needed for Chart.js.
    location = /owner/ {
        root /usr/share/nginx/html;
        index index.html;
        try_files /owner/index.html =404;

        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://cdn.jsdelivr.net; frame-src 'none'; frame-ancestors 'none'; form-action 'self'; base-uri 'self'; object-src 'none'" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}


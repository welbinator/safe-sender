version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sendersafety}
      POSTGRES_USER: ${POSTGRES_USER:-sendersafety}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sendersafety}"]
      interval: 5s
      timeout: 5s
      retries: 10
    # No port exposure — internal only

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_SECRET: ${ADMIN_SECRET}
      INTERNAL_SHARED_SECRET: ${INTERNAL_SHARED_SECRET}
      SNS_ALLOWED_TOPIC_ARNS: ${SNS_ALLOWED_TOPIC_ARNS}
    # Bind to loopback only — nginx is the only thing that should reach the API.
    ports:
      - "127.0.0.1:8000:8000"
    restart: always

  smtp:
    build:
      context: .
      dockerfile: smtp/Dockerfile
    ports:
      - "25:25"
      - "587:587"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      BACKEND_URL: http://backend:8000
      INTERNAL_SHARED_SECRET: ${INTERNAL_SHARED_SECRET}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      SES_SOURCE_ARN: ${SES_SOURCE_ARN}
      AUTH_USERNAME: ${SMTP_AUTH_USERNAME}
      AUTH_PASSWORD: ${SMTP_AUTH_PASSWORD}
      TLS_CERT_PATH: ${TLS_CERT_PATH}
      TLS_KEY_PATH: ${TLS_KEY_PATH}
      PORT25_ALLOWED_CIDRS: ${PORT25_ALLOWED_CIDRS:-}
    volumes:
      # Mount Let's Encrypt certs from host
      - /etc/letsencrypt:/etc/letsencrypt:ro
    restart: always

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
      # VITE_API_URL is baked into the SPA at build time. Default '/api'
      # routes through the same nginx via the /api/ location block.
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    volumes:
      # nginx.conf is now baked into the image (see nginx/Dockerfile),
      # so we no longer bind-mount it. Edit nginx/nginx.conf and rebuild
      # the nginx image to pick up changes.
      #
      # Letsencrypt certs are still bind-mounted so renewals on the host
      # propagate without an image rebuild.
      - /etc/letsencrypt:/etc/letsencrypt:ro
    restart: always

volumes:
  postgres_data:

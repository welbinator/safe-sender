version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sendersafety}
      POSTGRES_USER: ${POSTGRES_USER:-sendersafety}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sendersafety}"]
      interval: 5s
      timeout: 5s
      retries: 10
    # No port exposure — internal only

  backend:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_SECRET: ${ADMIN_SECRET}
      INTERNAL_SHARED_SECRET: ${INTERNAL_SHARED_SECRET}
      SNS_ALLOWED_TOPIC_ARNS: ${SNS_ALLOWED_TOPIC_ARNS}
    # Bind to loopback only — nginx is the only thing that should reach the API.
    ports:
      - "127.0.0.1:8000:8000"
    restart: always

  smtp:
    build: ./smtp
    ports:
      - "25:25"
      - "587:587"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      BACKEND_URL: http://backend:8000
      INTERNAL_SHARED_SECRET: ${INTERNAL_SHARED_SECRET}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      SES_SOURCE_ARN: ${SES_SOURCE_ARN}
      AUTH_USERNAME: ${SMTP_AUTH_USERNAME}
      AUTH_PASSWORD: ${SMTP_AUTH_PASSWORD}
      TLS_CERT_PATH: ${TLS_CERT_PATH}
      TLS_KEY_PATH: ${TLS_KEY_PATH}
      PORT25_ALLOWED_CIDRS: ${PORT25_ALLOWED_CIDRS:-}
    volumes:
      # Mount Let's Encrypt certs from host
      - /etc/letsencrypt:/etc/letsencrypt:ro
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # nginx.conf references /etc/letsencrypt/live/... paths directly,
      # so we bind-mount the whole letsencrypt dir read-only.
      - /etc/letsencrypt:/etc/letsencrypt:ro
    restart: always

volumes:
  postgres_data:

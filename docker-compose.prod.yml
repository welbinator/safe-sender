version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sendersafety}
      POSTGRES_USER: ${POSTGRES_USER:-sendersafety}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sendersafety}"]
      interval: 5s
      timeout: 5s
      retries: 10
    # No port exposure — internal only

  redis:
    image: redis:7-alpine
    command:
      - redis-server
      - --save
      - ''
      - --appendonly
      - 'no'
      - --maxmemory
      - 64mb
      - --maxmemory-policy
      - allkeys-lru
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_SECRET: ${ADMIN_SECRET}
      INTERNAL_SHARED_SECRET: ${INTERNAL_SHARED_SECRET}
      MAILGUN_API_KEY: ${MAILGUN_API_KEY}
      MAILGUN_DOMAIN: ${MAILGUN_DOMAIN}
      FROM_EMAIL: ${FROM_EMAIL}
      MAILGUN_WEBHOOK_SIGNING_KEY: ${MAILGUN_WEBHOOK_SIGNING_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      ALLOW_TEST_TOKENS: ${ALLOW_TEST_TOKENS:-0}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      # Sentry (F-58)
      SENTRY_DSN: ${SENTRY_DSN_BACKEND:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.05}
      SENTRY_RELEASE: ${SENTRY_RELEASE:-}
      SERVICE_NAME: backend
    # Bind to loopback only — nginx is the only thing that should reach the API.
    ports:
      - "127.0.0.1:8000:8000"
    restart: always

  smtp:
    build: ./smtp
    ports:
      - "25:25"
      - "587:587"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      BACKEND_URL: http://backend:8000
      INTERNAL_SHARED_SECRET: ${INTERNAL_SHARED_SECRET}
      MAILGUN_SMTP_HOST: ${MAILGUN_SMTP_HOST}
      MAILGUN_SMTP_PORT: ${MAILGUN_SMTP_PORT}
      MAILGUN_SMTP_LOGIN: ${MAILGUN_SMTP_LOGIN}
      MAILGUN_SMTP_PASSWORD: ${MAILGUN_SMTP_PASSWORD}
      MAILGUN_API_KEY: ${MAILGUN_API_KEY}
      MAILGUN_DOMAIN: ${MAILGUN_DOMAIN}
      FROM_EMAIL: ${FROM_EMAIL}
      AUTH_USERNAME: ${SMTP_AUTH_USERNAME}
      AUTH_PASSWORD: ${SMTP_AUTH_PASSWORD}
      TLS_CERT_PATH: ${TLS_CERT_PATH}
      TLS_KEY_PATH: ${TLS_KEY_PATH}
      PORT25_ALLOWED_CIDRS: ${PORT25_ALLOWED_CIDRS:-}
      # Sentry (F-58)
      SENTRY_DSN: ${SENTRY_DSN_SMTP:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.05}
      SENTRY_RELEASE: ${SENTRY_RELEASE:-}
      SERVICE_NAME: smtp
    volumes:
      # Mount Let's Encrypt certs from host
      - /etc/letsencrypt:/etc/letsencrypt:ro
    restart: always

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
      # VITE_API_URL is baked into the SPA at build time. Default '/api'
      # routes through the same nginx via the /api/ location block.
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        # Sentry — baked into the SPA bundle at build time.
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
        VITE_SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
        VITE_SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.05}
        VITE_SENTRY_RELEASE: ${SENTRY_RELEASE:-}
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    volumes:
      # nginx.conf is now baked into the image (see nginx/Dockerfile),
      # so we no longer bind-mount it. Edit nginx/nginx.conf and rebuild
      # the nginx image to pick up changes.
      #
      # Letsencrypt certs are still bind-mounted so renewals on the host
      # propagate without an image rebuild.
      - /etc/letsencrypt:/etc/letsencrypt:ro
    restart: always

volumes:
  postgres_data:

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sendersafety}
      POSTGRES_USER: ${POSTGRES_USER:-sendersafety}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sendersafety}"]
      interval: 5s
      timeout: 5s
      retries: 10
    # F-51 — resource caps (single-host compose, not swarm).
    # Hetzner CX21 has 2GB / 2 vCPU; budget conservatively. Sum across
    # services ≈ 1.8GB to leave ~200MB for kernel + cron + sshd.
    mem_limit: 640m
    mem_reservation: 256m
    cpus: 0.75

  # F-49 — Redis backing for per-customer rate limiting.
  # alpine image is ~30MB, RAM cap 96MB (rate-limit buckets are tiny, and
  # `maxmemory-policy allkeys-lru` evicts cold keys if we ever overshoot).
  # No persistence: rate-limit state is intentionally ephemeral.
  redis:
    image: redis:7-alpine
    command:
      - redis-server
      - --save
      - ""
      - --appendonly
      - "no"
      - --maxmemory
      - "64mb"
      - --maxmemory-policy
      - allkeys-lru
    ports:
      - "127.0.0.1:6379:6379"
    restart: on-failure
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    mem_limit: 96m
    mem_reservation: 32m
    cpus: 0.25

  backend:
    build: ./backend
    # Bind to loopback only — nginx is the only thing that should reach the API.
    ports:
      - "127.0.0.1:8000:8000"
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://sendersafety:changeme@postgres:5432/sendersafety}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-1}
      RATE_LIMIT_READ_PER_MIN: ${RATE_LIMIT_READ_PER_MIN:-120}
      RATE_LIMIT_WRITE_PER_MIN: ${RATE_LIMIT_WRITE_PER_MIN:-30}
      RATE_LIMIT_AUTH_PER_MIN: ${RATE_LIMIT_AUTH_PER_MIN:-20}
      JWT_SECRET: ${JWT_SECRET:-changeme}
      INTERNAL_SHARED_SECRET: ${INTERNAL_SHARED_SECRET:-}
      SNS_ALLOWED_TOPIC_ARNS: ${SNS_ALLOWED_TOPIC_ARNS:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      ALLOW_TEST_TOKENS: ${ALLOW_TEST_TOKENS:-0}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      SES_FROM_EMAIL: ${SES_FROM_EMAIL:-noreply@sendersafety.com}
      ADMIN_SECRET: ${ADMIN_SECRET:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
    # F-51 — backend is the largest memory user (asyncpg pool + RE2 buffers).
    mem_limit: 640m
    mem_reservation: 256m
    cpus: 1.0
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  smtp:
    build: ./smtp
    ports:
      - "25:25"
      - "587:587"
    restart: on-failure
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://sendersafety:changeme@postgres:5432/sendersafety}
      BACKEND_URL: http://backend:8000
      INTERNAL_SHARED_SECRET: ${INTERNAL_SHARED_SECRET:-}
      PORT25_ALLOWED_CIDRS: ${PORT25_ALLOWED_CIDRS:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      SES_SOURCE_ARN: ${SES_SOURCE_ARN:-}
      AUTH_USERNAME: ${SMTP_AUTH_USERNAME:-}
      AUTH_PASSWORD: ${SMTP_AUTH_PASSWORD:-}
      TLS_CERT_PATH: ${TLS_CERT_PATH:-/etc/letsencrypt/live/smtp.sendersafety.com/fullchain.pem}
      TLS_KEY_PATH: ${TLS_KEY_PATH:-/etc/letsencrypt/live/smtp.sendersafety.com/privkey.pem}
    # F-51 — SMTP is mostly idle between bursts.
    mem_limit: 384m
    mem_reservation: 96m
    cpus: 0.75
    # F-50 — orchestrator/healthcheck target on loopback:9100.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:9100/health', timeout=2).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
      args:
        VITE_API_URL: /api
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
    # F-51 — nginx is light; small cap is fine.
    mem_limit: 128m
    mem_reservation: 32m
    cpus: 0.5

volumes:
  postgres_data:
